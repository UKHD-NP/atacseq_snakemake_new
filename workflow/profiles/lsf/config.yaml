# Snakemake LSF profile for DKFZ HPC execution
# Usage: snakemake --profile workflow/profiles/lsf [other options]
#
# Requirements: snakemake-executor-plugin-lsf
#   pip install snakemake-executor-plugin-lsf
#
# Submit manually with bsub on bsub01.lsf.dkfz.de or bsub02.lsf.dkfz.de.
# Adjust lsf_queue values to match available queues (short, medium, long, etc.).

executor: lsf

# Default LSF job options (overridden per-rule via resources: in .smk files)
default-resources:
  lsf_queue: "long"
  lsf_extra: "''"
  mem_mb: 8192
  runtime: 120

# Job submission settings
jobs: 30
rerun-incomplete: true
latency-wait: 60
keep-going: false

# Conda environments
use-conda: true
conda-frontend: mamba
# Store conda envs outside home (20 GB quota!) - update path to your analysis share
conda-prefix: "/omics/odcf/analysis/YOUR_GROUP/conda_envs"

# Retries on job failure
retries: 2

# Global cores cap: controls --cores passed to each per-job subprocess
cores: 300

# Per-rule thread overrides (sets actual Snakemake threads, affects --cores in subprocess)
set-threads:
  trim_galore: 12
  fastp: 12
  bwa_mem2_index: 12
  bowtie2_index: 12
  bwa_mem2_align: 12
  bowtie2_align: 12
  sort_bam: 6
  mark_duplicates: 2
  bam_filter: 6
  shift_bam: 8
  macs3_callpeak_tn5: 2
  deeptools_compute_matrix_scale_regions: 12
  deeptools_compute_matrix_reference_point: 12
  deeptools_plot_fingerprint: 6
  deeptools_plot_profile: 2
  deeptools_plot_heatmap: 2
  deeptools_fragment_size_distribution: 2
  homer_annotate_peaks: 2
  bedtools_genomecov: 2
  ucsc_bedgraphtobigwig: 2
  ataqv: 2
  multiqc: 2

# Per-rule resource overrides (mem_mb matches rule definitions)
set-resources:
  trim_galore:
    mem_mb: 36864
    runtime: 9999
    lsf_queue: "verylong"
  fastp:
    mem_mb: 16384
    runtime: 9999
    lsf_queue: "verylong"
  bwa_mem2_index:
    mem_mb: 65536
    runtime: 480
    lsf_queue: "verylong"
  bowtie2_index:
    mem_mb: 8192
    runtime: 480
    lsf_queue: "verylong"
  bwa_mem2_align:
    mem_mb: 49152
    runtime: 9999
    lsf_queue: "verylong"
  bowtie2_align:
    mem_mb: 8192
    runtime: 9999
    lsf_queue: "verylong"
  sort_bam:
    mem_mb: 36864
    runtime: 480
  mark_duplicates:
    mem_mb: 48000
    runtime: 720
    lsf_queue: "verylong"
  bam_filter:
    mem_mb: 36864
    runtime: 480
  shift_bam:
    mem_mb: 24000
    runtime: 480
  macs3_callpeak_tn5:
    mem_mb: 8192
    runtime: 480
  deeptools_compute_matrix_scale_regions:
