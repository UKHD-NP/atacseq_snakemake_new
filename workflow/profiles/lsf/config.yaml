# Snakemake LSF profile for HPC execution
# Usage: snakemake --profile workflow/profiles/lsf [other options]
#
# Requirements: snakemake-executor-plugin-lsf
#   pip install snakemake-executor-plugin-lsf
#
# Submit manually from a submission node with bsub access.
# Adjust lsf_queue values to match available queues (short, medium, long, etc.).

executor: lsf

# Default LSF job options (overridden per-rule via resources: in .smk files)
default-resources:
  lsf_queue: "long"
  lsf_extra: "'-env all'"
  mem_mb: 8192
  runtime: 120

# Job submission settings
jobs: 20
rerun-incomplete: true
latency-wait: 60
keep-going: true

# Conda environments
use-conda: true
conda-frontend: mamba
# Store conda envs outside home (quota may be limited) - update path to your group storage
conda-prefix: "/path/to/group/storage/conda_envs"

# Retries on job failure
retries: 5

# Global cores cap: controls --cores passed to each per-job subprocess
cores: 300

# Per-rule resource overrides
set-resources:

  # ---- FASTQC ----
  fastqc_raw:
    lsf_queue: "long"

  fastqc_trimmed:
    lsf_queue: "long"

  # ---- TRIMMING ----
  trim_galore:
    lsf_queue: "verylong"

  fastp:
    lsf_queue: "verylong"

  # ---- INDEX ----
  bwa_mem2_index:
    lsf_queue: "verylong"

  bowtie2_index:
    lsf_queue: "verylong"

  # ---- ALIGNMENT ----
  bwa_mem2_align:
    lsf_queue: "verylong"

  bowtie2_align:
    lsf_queue: "verylong"

  # ---- BAM PROCESSING ----
  sort_bam:
    lsf_queue: "long"

  mark_duplicates:
    lsf_queue: "verylong"

  bam_filter:
    lsf_queue: "verylong"

  shift_bam:
    lsf_queue: "verylong"

  shifted_bam_to_bigwig:
    lsf_queue: "long"

  # ---- POST ALIGNMENT QC ----
  samtools_stats_pre_filter:
    lsf_queue: "long"

  samtools_stats:
    lsf_queue: "long"

  picard_collect_multiple_metrics:
    lsf_queue: "long"

  # ---- PEAK CALLING ----
  macs3_callpeak_tn5:
    lsf_queue: "long"

  # ---- PEAK QC / FRiP ----
  macs3_peak_qc_plot:
    lsf_queue: "medium"

  featurecounts_in_peaks:
    lsf_queue: "medium"

  frip_score:
    lsf_queue: "medium"

  # ---- ANNOTATION ----
  homer_annotate_peaks:
    lsf_queue: "medium"

  # ---- BIGWIG ----
  bedtools_genomecov:
    lsf_queue: "long"

  ucsc_bedgraphtobigwig:
    lsf_queue: "long"

  # ---- POST PEAK CALLING QC ----
  # ---- DEEPTOOLS ----
  deeptools_compute_matrix_gene_body:
    lsf_queue: "long"

  deeptools_compute_matrix_tss:
    lsf_queue: "long"

  deeptools_plot_fingerprint:
    lsf_queue: "verylong"

  deeptools_plot_profile_gene_body:
    lsf_queue: "long"

  deeptools_plot_profile_tss:
    lsf_queue: "long"

  deeptools_plot_heatmap_tss:
    lsf_queue: "long"

  deeptools_fragment_size_distribution:
    lsf_queue: "verylong"

  # ---- NFR ----
  nfr_bigwig_nfr:
    lsf_queue: "verylong"

  nfr_bigwig_mono:
    lsf_queue: "verylong"

  nfr_compute_matrix:
    lsf_queue: "long"

  nfr_plot_profile:
    lsf_queue: "long"

  nfr_plot_heatmap:
    lsf_queue: "long"

  # ---- ataqv ----
  ataqv:
    lsf_queue: "long"

  ataqv_mqc:
    lsf_queue: "medium"
  
  ataqv_mkarv:
    lsf_queue: "long"

  # ---- ATACSEQQC ----
  atacseqqc_mqc:
    lsf_queue: "verylong"

  # ---- FINAL ----
  multiqc:
    lsf_queue: "medium"
