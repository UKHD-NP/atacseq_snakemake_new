# Snakemake LSF profile for HPC execution
# Usage: snakemake --profile workflow/profiles/lsf [other options]
#
# Requirements: snakemake-executor-plugin-lsf
#   pip install snakemake-executor-plugin-lsf
#
# Submit manually from a submission node with bsub access.
# Adjust lsf_queue values to match available queues (short, medium, long, etc.).

executor: lsf

# Default LSF job options (overridden per-rule via resources: in .smk files)
default-resources:
  lsf_queue: "long"
  lsf_extra: "'-env all'"
  mem_mb: 8192
  runtime: 120

# Job submission settings
jobs: 20
rerun-incomplete: true
latency-wait: 60
keep-going: true

# Conda environments
use-conda: true
conda-frontend: mamba
# Store conda envs outside home (quota may be limited) - update path to your group storage
conda-prefix: "/path/to/group/storage/conda_envs"

# Retries on job failure
retries: 5

# Global cores cap: controls --cores passed to each per-job subprocess
cores: 300

# Per-rule thread overrides
set-threads:
  fastqc_raw: 2
  fastqc_trimmed: 2
  trim_galore: 12
  fastp: 12
  bwa_mem2_index: 12
  bowtie2_index: 12
  bwa_mem2_align: 12
  bowtie2_align: 26
  sort_bam: 6
  mark_duplicates: 2
  bam_filter: 6
  shift_bam: 48
  macs3_callpeak_tn5: 2
  deeptools_compute_matrix_gene_body: 12
  deeptools_compute_matrix_tss: 12
  deeptools_plot_fingerprint: 6
  deeptools_plot_profile_gene_body: 2
  deeptools_plot_profile_tss: 2
  deeptools_plot_heatmap_tss: 2
  deeptools_fragment_size_distribution: 6
  samtools_stats_pre_filter: 1
  samtools_stats: 1
  featurecounts_in_peaks: 1
  frip_score: 1
  macs3_peak_qc_plot: 2
  homer_annotate_peaks: 2
  bedtools_genomecov: 2
  ucsc_bedgraphtobigwig: 2
  ataqv: 1
  ataqv_mqc: 1
  ataqv_mkarv: 1
  atacseqqc_mqc: 1
  nfr_bigwig_nfr: 8
  nfr_bigwig_mono: 8
  nfr_compute_matrix: 12
  nfr_plot_profile: 2
  nfr_plot_heatmap: 2
  picard_collect_multiple_metrics: 1
  multiqc: 1

# Per-rule resource overrides
set-resources:

  # ---- FASTQC ----
  fastqc_raw:
    lsf_queue: "long"

  fastqc_trimmed:
    lsf_queue: "long"

  # ---- TRIMMING ----
  trim_galore:
    lsf_queue: "verylong"

  fastp:
    lsf_queue: "verylong"

  # ---- INDEX ----
  bwa_mem2_index:
    lsf_queue: "verylong"

  bowtie2_index:
    lsf_queue: "verylong"

  # ---- ALIGNMENT ----
  bwa_mem2_align:
    lsf_queue: "verylong"

  bowtie2_align:
    lsf_queue: "verylong"

  # ---- BAM PROCESSING ----
  sort_bam:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  mark_duplicates:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  bam_filter:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  shift_bam:
    lsf_queue: "verylong"

  # ---- POST ALIGNMENT QC ----
  samtools_stats_pre_filter:
    lsf_queue: "long"

  samtools_stats:
    lsf_queue: "long"

  picard_collect_multiple_metrics:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- PEAK CALLING ----
  macs3_callpeak_tn5:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- PEAK QC / FRiP ----
  macs3_peak_qc_plot:
    lsf_queue: "long"

  featurecounts_in_peaks:
    lsf_queue: "long"

  frip_score:
    lsf_queue: "long"

  # ---- ANNOTATION ----
  homer_annotate_peaks:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- BIGWIG ----
  bedtools_genomecov:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  ucsc_bedgraphtobigwig:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- POST PEAK CALLING QC ----
  # ---- DEEPTOOLS ----
  deeptools_compute_matrix_gene_body:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_compute_matrix_tss:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_plot_fingerprint:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_plot_profile_gene_body:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_plot_profile_tss:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_plot_heatmap_tss:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  deeptools_fragment_size_distribution:
    lsf_queue: "verylong"

  # ---- NFR ----
  nfr_bigwig_nfr:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  nfr_bigwig_mono:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  nfr_compute_matrix:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  nfr_plot_profile:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  nfr_plot_heatmap:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- ataqv ----
  ataqv:
    lsf_queue: "verylong"

  ataqv_mqc:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"
  
  ataqv_mkarv:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"

  # ---- ATACSEQQC ----
  atacseqqc_mqc:
    lsf_queue: "verylong"

  # ---- FINAL ----
  multiqc:
    lsf_queue: "lambda wildcards, attempt, **kwargs: 'verylong' if attempt > 1 else 'long'"
