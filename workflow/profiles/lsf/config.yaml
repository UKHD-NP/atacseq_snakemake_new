    runtime: 960
    lsf_queue: "verylong"
  deeptools_compute_matrix_reference_point:
    mem_mb: 10240
    runtime: 960
    lsf_queue: "verylong"
  deeptools_plot_fingerprint:
    mem_mb: 6144
    runtime: 960
    lsf_queue: "verylong"
  deeptools_plot_profile:
    mem_mb: 6144
    runtime: 480
  deeptools_plot_heatmap:
