# Snakemake LSF profile for DKFZ HPC execution
# Usage: snakemake --profile workflow/profiles/lsf [other options]
#
# Requirements: snakemake-executor-plugin-lsf
#   pip install snakemake-executor-plugin-lsf
#
# Submit manually with bsub on bsub01.lsf.dkfz.de or bsub02.lsf.dkfz.de.
# Adjust lsf_queue values to match available queues (short, medium, long, etc.).

executor: lsf

# Default LSF job options (overridden per-rule via resources: in .smk files)
default-resources:
  lsf_queue: "long"                # Change to your preferred default queue
  lsf_extra: "''"                  # Extra bsub flags (e.g. "-P project_name")
  mem_mb: 8192                     # Default memory (MB)
  runtime: 120                     # Default wall time (minutes)
  threads: 2                       # Default CPU threads
  
# Job submission settings
jobs: 100                          # Max concurrent LSF jobs
rerun-incomplete: true
latency-wait: 60                   # Wait for NFS file visibility (seconds)
keep-going: false                  # Stop all jobs on first failure

# Conda environments
use-conda: true
conda-frontend: mamba
# Store conda envs outside home (20 GB quota!) — update path to your analysis share
conda-prefix: "/omics/odcf/analysis/YOUR_GROUP/conda_envs"

# Retries on job failure
retries: 2

# Per-rule resource overrides:
#   process_high   → 12 CPUs, 72 GB, 16h
#   process_medium → 6 CPUs,  36 GB,  8h
#   process_low    → 2 CPUs,  12 GB,  4h
set-resources:
  trim_galore:                     # process_high
    mem_mb: 73728                  # 72 GB
    threads: 12
    runtime: 9999                  # No effective limit on verylong queue
    lsf_queue: "verylong"
  fastp:                           # process_high (equivalent)
    mem_mb: 73728
    threads: 12
    runtime: 9999
    lsf_queue: "verylong"
  bwa_mem2_index:                  # process_high (bwa-mem2 index needs more RAM)
    mem_mb: 65536
    threads: 12
    runtime: 480
    lsf_queue: "verylong"
  bowtie2_index:                   # process_high
    mem_mb: 73728
    threads: 12
    runtime: 480
    lsf_queue: "verylong"
  bwa_mem2_align:                  # process_high
    mem_mb: 73728
    threads: 12
    runtime: 9999
    lsf_queue: "verylong"
  bowtie2_align:                   # process_high
    mem_mb: 73728
    threads: 12
    runtime: 9999
    lsf_queue: "verylong"
  sort_bam:                        # process_medium
    mem_mb: 36864                  # 36 GB
    threads: 6
    runtime: 480
  mark_duplicates:                 # process_medium
    mem_mb: 36864
    threads: 6
    runtime: 480
  bam_filter:                      # process_medium
    mem_mb: 36864
    threads: 6
    runtime: 480
  shift_bam:                       # process_medium
    mem_mb: 36864
    threads: 6
    runtime: 480
  macs3_callpeak_tn5:              # process_medium
    mem_mb: 36864
    threads: 6
    runtime: 480
  deeptools_compute_matrix_scale_regions:    # process_high
    mem_mb: 73728
    threads: 12
    runtime: 960
  deeptools_compute_matrix_reference_point:  # process_high
    mem_mb: 73728
    threads: 12
    runtime: 960
  deeptools_plot_fingerprint:      # process_high
    mem_mb: 73728
    threads: 12
    runtime: 960
  multiqc:                         # process_medium
    mem_mb: 36864
    threads: 6
    runtime: 480
