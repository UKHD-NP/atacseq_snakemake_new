title: "ATAC-seq Quality Control Report"
subtitle: "Generated by Snakemake ATAC-seq Pipeline"
intro_text: "QC summary for ATAC-seq preprocessing, alignment, peak calling and signal tracks."

export_plots: true
export_plots_timeout: 60
disable_version_detection: true
sample_names_replace_exact: true

report_section_order:
  fastqc_raw:
    order: 4000
  fastp:
    order: 3900
  cutadapt:
    order: 3900
  fastqc_trimmed:
    order: 3800
  samtools:
    order: 3000
  picard:
    order: 2900
  deeptools:
    order: 2800
  ataqv:
    order: 2700
  peak_count:
    order: 2600
  macs_peakqc_summary:
    order: 2500
  frip_score:
    order: 2400
  ataqv_mqc:
    order: 2300
  atacseqqc_mqc:
    order: 2200
  nfr_fragment_counts:
    order: 2150
  homer_annotation:
    order: 2100
  featurecounts:
    order: 2000

module_order:
  - fastqc:
      anchor: "fastqc_raw"
      name: "FastQC (raw)"
      info: "Quality control metrics for raw FASTQ files."
      path_filters:
        - "*_raw_*_fastqc.zip"
  - fastp:
      anchor: "fastp"
      name: "FastP"
      info: "Adapter trimming and quality filtering with FastP."
  - cutadapt:
      anchor: "cutadapt"
      name: "Trim Galore"
      info: "Adapter trimming reports from Trim Galore / Cutadapt."
      path_filters:
        - "*trimming_report.txt"
  - fastqc:
      anchor: "fastqc_trimmed"
      name: "FastQC (trimmed)"
      info: "Quality control metrics for trimmed FASTQ files."
      path_filters:
        - "*_trimmed_*_fastqc.zip"
  - samtools:
      anchor: "samtools"
      name: "Samtools"
      info: "BAM-level statistics (pre-filter and post-filter)."
      path_filters:
        - "*.pre_filter.bam.stats"
        - "*.pre_filter.bam.flagstat"
        - "*.pre_filter.bam.idxstats"
        - "*.filtered.bam.stats"
        - "*.filtered.bam.flagstat"
        - "*.filtered.bam.idxstats"
  - picard:
      anchor: "picard"
      name: "Picard"
      info: "MarkDuplicates and CollectMultipleMetrics outputs."
      path_filters:
        - "*.MarkDuplicates.metrics.txt"
        - "*.alignment_summary_metrics"
        - "*.insert_size_metrics"
        - "*.base_distribution_by_cycle_metrics"
        - "*.quality_by_cycle_metrics"
        - "*.quality_distribution_metrics"
  - deeptools:
      anchor: "deeptools"
      name: "deepTools"
      info: "Fingerprint and profile QC metrics."
      path_filters:
        - "*.plotFingerprint.qcmetrics.txt"
        - "*.plotFingerprint.raw_counts.txt"
        - "*.plotProfile.tab"
        - "*.fragment_size.qcmetrics.txt"
        - "*.fragment_size.raw_lengths.txt"
  - ataqv:
      anchor: "ataqv"
      name: "ataqv"
      info: "ATAC-specific QC metrics including TSS enrichment and fragment profiles."
      path_filters:
        - "*.ataqv.json"
  - homer_annotate_peaks:
      anchor: "homer_annotate_peaks"
      name: "HOMER Peak Annotation"
      info: "Peak annotation summary generated from annotatePeaks."
      path_filters:
        - "*.macs_annotatePeaks.summary.txt"
  - featurecounts:
      anchor: "featurecounts"
      name: "featureCounts in Peaks"
      info: "Read assignment statistics against peak SAF."
      path_filters:
        - "*.readCountInPeaks.txt.summary"

extra_fn_clean_exts:
  - ".fastq.gz"
  - ".fq.gz"
  - "_fastqc"
  - ".fastp"
  - ".bam"
  - ".txt"

fn_clean_sample_names: true

sp:
  ataqv_mqc:
    fn: "*.ataqv_mqc.tsv"
  atacseqqc_mqc:
    fn: "*.atacseqqc_mqc.tsv"
  fastqc/zip:
    fn: "*_fastqc.zip"
  fastp:
    fn: "*.fastp.json"
  cutadapt:
    fn: "*trimming_report.txt"
  samtools/stats:
    fn: "*.bam.stats"
  samtools/flagstat:
    fn: "*.bam.flagstat"
  samtools/idxstats:
    fn: "*.bam.idxstats"
  picard/markdups:
    fn: "*.MarkDuplicates.metrics.txt"
  deeptools:
    fn: "*.plotFingerprint.qcmetrics.txt"
  deeptools_raw_counts:
    fn: "*.plotFingerprint.raw_counts.txt"
  deeptools_profile:
    fn: "*.plotProfile.tab"
  deeptools_fragment_size_table:
    fn: "*.fragment_size.qcmetrics.txt"
  deeptools_fragment_size_raw:
    fn: "*.fragment_size.raw_lengths.txt"
  ataqv:
    fn: "*.ataqv.json"
  macs_peakqc_summary:
    fn: "*.macs_peakqc.summary.txt"
  homer_annotation_summary:
    fn: "*.macs_annotatePeaks.summary.txt"
  peak_count:
    fn: "*_peaks.count_mqc.tsv"
  frip_score:
    fn: "*_peaks.FRiP_mqc.tsv"
  nfr_fragment_counts:
    fn: "*.fragment_counts_mqc.tsv"
  featurecounts:
    fn: "*.readCountInPeaks.txt.summary"

custom_data:
  peak_count:
    id: "peak_count"
    section_name: "Peak Counts"
    description: "Number of called peaks per sample."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "peak_count_table"
      title: "Peak Count by Sample"
    headers:
      peak_count:
        title: "Peak Count"
        format: "{:,.0f}"
  macs_peakqc_summary:
    id: "macs_peakqc_summary"
    section_name: "MACS Peak QC Summary"
    description: "Summary statistics from MACS peak QC plots."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "macs_peakqc_summary_table"
      title: "MACS Peak QC Metrics"
  frip_score:
    id: "frip_score"
    section_name: "FRiP Scores"
    description: "Fraction of reads in called peaks (FRiP)."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "frip_score_table"
      title: "FRiP by Sample"
    headers:
      FRiP_bedtools:
        title: "FRiP (bedtools %)"
        format: "{:,.2f}"
      FRiP_featureCounts:
        title: "FRiP (featureCounts %)"
        format: "{:,.2f}"
  ataqv_mqc:
    id: "ataqv_mqc"
    section_name: "ataqv Metrics (NFR / TSSE)"
    description: "Short mononucleosomal ratio and TSS enrichment score (TSSE) computed by ataqv."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "ataqv_mqc_table"
      title: "ataqv Metrics (NFR / TSSE)"
    headers:
      nfr_ratio:
        title: "NFR Ratio"
        description: "short_mononucleosomal_ratio: fragments ≤100 bp (hqaa_tf_count) / fragments 180-300 bp (hqaa_mononucleosomal_count)"
        format: "{:,.4f}"
        min: 0
        scale: "RdYlGn"
      hqaa_tf_count:
        title: "HQAA TF Reads"
        description: "High-quality autosomal aligned NFR fragment count"
        format: "{:,.0f}"
      hqaa_mono_count:
        title: "HQAA Mono Reads"
        description: "High-quality autosomal aligned mononucleosomal fragment count"
        format: "{:,.0f}"
      tss_enrichment:
        title: "TSSE Score"
        description: "Signal at TSS / background flanking signal (ataqv)"
        format: "{:,.4f}"
        min: 0
        scale: "RdYlGn"
  atacseqqc_mqc:
    id: "atacseqqc_mqc"
    section_name: "ATACseqQC Metrics (PT / NFR / TSSE)"
    description: "Promoter/transcript body score (PT), per-TSS nucleosome-free region score (NFR), and TSS enrichment score (TSSE) computed by ATACseqQC on Tn5-shifted BAM."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "atacseqqc_mqc_table"
      title: "ATACseqQC Metrics (PT / NFR / TSSE)"
    headers:
      PT_score_mean:
        title: "PT Score (mean)"
        description: "Mean log2(promoter coverage / transcript body coverage) per transcript; positive values indicate promoter-enriched signal (ATACseqQC PTscore)"
        format: "{:,.4f}"
        scale: "RdYlGn"
      PT_score_median:
        title: "PT Score (median)"
        description: "Median log2(promoter coverage / transcript body coverage) per transcript (ATACseqQC PTscore)"
        format: "{:,.4f}"
        scale: "RdYlGn"
      Mean_promoter:
        title: "Mean Promoter Signal"
        description: "Mean Tn5 5' insertion density across promoter windows [TSS-2000, TSS+500]"
        format: "{:,.6f}"
        min: 0
      Mean_gene_body:
        title: "Mean Gene Body Signal"
        description: "Mean Tn5 5' insertion density across transcript body windows (2500 bp downstream of promoter)"
        format: "{:,.6f}"
        min: 0
      NFR_score_mean:
        title: "NFR Score (mean)"
        description: "Mean log2(nf) − log2((n1+n2)/2) across all TSS; 400 bp window: nf = 5' ends in middle 100 bp, n1/n2 = 5' ends in upstream/downstream 150 bp (ATACseqQC NFRscore)"
        format: "{:,.4f}"
        scale: "RdYlGn"
      NFR_score_median:
        title: "NFR Score (median)"
        description: "Median log2(nf) − log2((n1+n2)/2) across all TSS (ATACseqQC NFRscore)"
        format: "{:,.4f}"
        scale: "RdYlGn"
      TSSE_score:
        title: "TSSE Score"
        description: "Depth at each 100 bp step within ±1000 bp of TSS / mean depth at 100 bp end flanks; TSSE = max(mean(per-window TSS score)) (ATACseqQC)"
        format: "{:,.4f}"
        min: 0
        scale: "RdYlGn"
  nfr_fragment_counts:
    id: "nfr_fragment_counts"
    section_name: "Fragment Size Class Counts"
    description: "Number and percentage of read pairs per nucleosomal size class (NFR ≤150 bp, mono 151–300 bp, di 301–500 bp, tri 501–700 bp), counted from the Tn5-shifted BAM."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "nfr_fragment_counts_table"
      title: "Fragment Size Class Counts"
    headers:
      nfr_reads:
        title: "NFR Reads"
        description: "Read pairs with fragment length ≤150 bp"
        format: "{:,.0f}"
        min: 0
      mono_reads:
        title: "Mono Reads"
        description: "Read pairs with fragment length 151–300 bp"
        format: "{:,.0f}"
        min: 0
      di_reads:
        title: "Di Reads"
        description: "Read pairs with fragment length 301–500 bp"
        format: "{:,.0f}"
        min: 0
      tri_reads:
        title: "Tri Reads"
        description: "Read pairs with fragment length 501–700 bp"
        format: "{:,.0f}"
        min: 0
      nfr_pct:
        title: "NFR %"
        description: "NFR reads as % of all properly paired read1"
        format: "{:,.2f}"
        min: 0
        max: 100
        scale: "RdYlGn"
      mono_pct:
        title: "Mono %"
        description: "Mono reads as % of all properly paired read1"
        format: "{:,.2f}"
        min: 0
        max: 100
        scale: "RdYlGn"
      di_pct:
        title: "Di %"
        description: "Di reads as % of all properly paired read1"
        format: "{:,.2f}"
        min: 0
        max: 100
        scale: "RdYlGn"
      tri_pct:
        title: "Tri %"
        description: "Tri reads as % of all properly paired read1"
        format: "{:,.2f}"
        min: 0
        max: 100
        scale: "RdYlGn"
  homer_annotation_summary:
    id: "homer_annotation_summary"
    section_name: "HOMER Annotation Summary"
    description: "Peak annotation category counts by sample."
    file_format: "tsv"
    plot_type: "table"
    pconfig:
      namespace: "ATAC"
      id: "homer_annotation_summary_table"
      title: "Peak Annotation Categories"

collapse_tables: false
show_analysis_paths: false
show_analysis_time: true

decimalPoint_format: "."
thousands_sep_format: ","
